# monitor

monitor=,preferred,auto,auto

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nautilus
$menu = rofi -show-icons -show drun
$browser = firefox

#################
### AUTOSTART ###
#################	

exec-once = waybar 
exec-once = hyprpaper 
exec-once = systemctl --user start hyprpolkitagent
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/bin/dbus-update-activation-environment --all 
exec-once = waypaper --restore
exec-once = swww-daemon
exec-once = swww img ~/Imágenes/Wallpapers/c.png

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3"

env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct

env = QT_QPA_PLATFORMTHEME,qt6ct   
# para aplicaciones Qt 

env= WLR_RENDERER_ALLOW_SOFTWARE,1
env= GDK_BACKEND,wayland
env= ELECTRON_OZONE_PLATFORM_HINT,wayland

env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = STEAM_USE_WAYLAND,1
env = STEAM_FORCE_DESKTOPUI_SCALING,1


##############################
####### LOOK AND FEEL ########
##############################

source = /home/bachpro/.config/hypr/colors/colors.conf

general {
    gaps_in = 10
    gaps_out = 22
    border_size = 2
    resize_on_border = true
    
    # COLORS
    
    col.active_border = $foreground $color1 45deg
    col.inactive_border = $color2

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

