# в”Џв”Џ в”Џв”Ѓв”ѓв”Џв”Ѓ в”›в”Ѓв”Џв”›в”Џв”Ѓв”ѓв”Џв”Ѓв”ѓв”Џв”Ѓв”›
# в”ѓв”ѓв”ѓв”ѓ в”ѓв”ѓ в”ѓв”ѓ в”ѓ в”ѓ в”ѓв”Џв”Џв”›в”Ѓв”Ѓв”ѓ
# в”›в”›в”›в”Ѓв”Ѓв”›в”› в”›в”› в”› в”Ѓв”Ѓв”›в”› в”›в”Ѓв”Ѓв”›
#      MONTORS
monitor=,preferred,auto,1
monitor=,preferred,auto,1,mirror,eDP-1

# в”Џв”Ѓв”ѓв”Џв”Ѓв”ѓв”Џв”Ѓв”ѓв”Џв”Ѓв”›в”Џв”Ѓв”ѓв”Џв”Ѓв”ѓв”Џв”Џ в”Џв”Ѓв”›
# в”Џв”Ѓв”›в”Џв”Џв”›в”ѓ в”ѓв”ѓ в”ѓв”Џв”Џв”›в”Џв”Ѓв”ѓв”ѓв”ѓв”ѓв”Ѓв”Ѓв”ѓ
# в”›  в”› в”›в”Ѓв”Ѓв”›в”Ѓв”Ѓв”›в”› в”›в”› в”›в”›в”›в”›в”Ѓв”Ѓв”›
#      PROGRAM
$terminal = kitty
$fileManager = kitty --class ranger-float -e ranger
$menu = rofi -show drun -show-icons
$Browser = firefox

# в”Џв”Ѓв”ѓв”ѓ в”ѓв”Ѓв”Џв”›в”Џв”Ѓв”ѓв”Џв”Ѓв”›в”Ѓв”Џв”›в”Џв”Ѓв”ѓв”Џв”Ѓв”ѓв”Ѓв”Џв”›
# в”Џв”Ѓв”ѓв”ѓ в”ѓ в”ѓ в”ѓ в”ѓв”Ѓв”Ѓв”ѓ в”ѓ в”Џв”Ѓв”ѓв”Џв”Џв”› в”ѓ 
# в”› в”›в”Ѓв”Ѓв”› в”› в”Ѓв”Ѓв”›в”Ѓв”Ѓв”› в”› в”› в”›в”› в”› в”› 
#      START
exec-once = waybar &
exec-once = systemctl --user start hyprpolkitagent
exec-once = swww-daemon & 
exec-once = gnome-keyring-daemon --start --components=secrets
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark" 

exec-once = swayosd-server

exec-once = swaync


#      ENV
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = MOZ_ENABLE_WAYLAND=1
env = QT_QPA_PLATFORMTHEME,qt6ct

env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

env = LIBVA_DRIVER_NAME,amdgpu
env = XDG_DESKTOP_PORTAL_DIR,/usr/share/xdg-desktop-portal
env = QT_QPA_PLATFORM,wayland;xcb 

# в”Џв”Ѓв”›в”Џв”Ѓ в”ѓ в”ѓв”›в”Џв”Ѓв”ѓв”Џв”Ѓв”ѓв”Џв”Џ в”Џв”Ѓв”›в”Џв”Ѓ в”Ѓв”Џв”›
# в”Џв”Ѓв”›в”ѓ в”ѓв”ѓ в”ѓв”ѓв”Џв”Џв”›в”ѓ в”ѓв”ѓв”ѓв”ѓв”Џв”Ѓв”›в”ѓ в”ѓ в”ѓ 
# в”Ѓв”Ѓв”›в”› в”› в”› в”›в”› в”›в”Ѓв”Ѓв”›в”›в”›в”›в”Ѓв”Ѓв”›в”› в”› в”›
#      PERMISSION
ecosystem {
   enforce_permissions = 1
}

permission = /usr/(bin|local/bin)/grim, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

# в”ѓ  в”Џв”Ѓв”ѓв”Џв”Ѓв”ѓв”ѓ в”ѓ  в”Џв”›в”ѓ   в”Џв”Ѓв”›в”Џв”Ѓв”›в”Џв”Ѓв”›в”ѓ  
# в”ѓ  в”ѓ в”ѓв”ѓ в”ѓв”Џв”›   в”ѓв”Ѓв”Џв”›  в”Џв”Ѓв”›в”Џв”Ѓв”›в”Џв”Ѓв”›в”ѓ  
# в”Ѓв”Ѓв”›в”Ѓв”Ѓв”›в”Ѓв”Ѓв”›в”› в”›  в”Ѓв”Ѓв”›   в”›  в”Ѓв”Ѓв”›в”Ѓв”Ѓв”›в”Ѓв”Ѓв”›
#      FEELING

general {
    gaps_in = 6
    gaps_out = 16

    border_size = 2

    col.active_border = rgba(225DB1aa)

    col.inactive_border = rgba(595959aa)

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.8

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true 
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)
    
    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92 
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1
    bezier = md2, 0.4, 0, 0.2, 1
    animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 3, md3_decel, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel
    animation = layersIn, 1, 3, menu_decel, slide
    animation = layersOut, 1, 1.6, menu_accel
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 4.5, menu_accel
    animation = workspaces, 1, 7, menu_decel, slide
    
    animation = workspaces, 1, 2.5, softAcDecel, slide
    animation = workspaces, 1, 7, menu_decel, slidefade 15%
    animation = specialWorkspace, 1, 3, md3_decel, slidefadevert 15%
    
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = false
}

# в”Џв”Џ в”›в”Џв”Ѓв”›в”Џв”Ѓв”›
# в”ѓв”ѓв”ѓв”ѓв”Ѓв”Ѓв”ѓв”ѓ  
# в”›в”›в”›в”›в”Ѓв”Ѓв”›в”Ѓв”Ѓв”›
#      INPUT

input {
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0.1

    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}
# 
# в”ѓ в”ѓв”Џв”Ѓв”›в”ѓ в”ѓ  в”Џв”Ѓ в”›в”Џв”Ѓ в”Џв”Ѓ в”›в”Џв”Ѓ в”Џв”Ѓв”›в”Џв”Ѓв”›
# в”Џв”› в”Џв”Ѓв”›в”Ѓв”Џв”›  в”Џв”Ѓв”ѓв”ѓв”ѓ в”ѓв”ѓ в”ѓв”ѓв”ѓ в”ѓв”ѓ в”ѓв”Ѓв”Ѓв”ѓ
# в”› в”›в”Ѓв”Ѓв”› в”›   в”Ѓв”Ѓ в”›в”› в”›в”Ѓв”Ѓ в”›в”› в”›в”Ѓв”Ѓв”›в”Ѓв”Ѓв”›
#      BINDINGS

$mainMod = SUPER

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,

bind = $mainMod, F, exec, $Browser
bind = $mainMod, N, exec, swaync-client -t

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl  = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindl  = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle

bindel = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = $mainMod, W, exec, ~/.config/scripts/reload_waybar.sh 

bind = ,Print, exec, grim - | wl-copy && notify-send "Captured!"
bind = SHIFT, Print, exec, grim -g "$(slurp -w 0)" - | wl-copy && notify-send "Captured!"

# в”ѓв”ѓв”ѓв”›в”Џв”Ѓ в”Џв”Ѓ в”Џв”Ѓв”ѓв”ѓв”ѓв”ѓ  в”Џв”›в”ѓ   в”ѓ  в”Џв”Ѓв”ѓв”ѓ в”ѓв”Џв”Ѓв”ѓв”ѓ в”ѓв”Ѓв”Џв”›
# в”ѓв”ѓв”ѓв”ѓв”ѓ в”ѓв”ѓ в”ѓв”ѓ в”ѓв”ѓв”ѓв”ѓ  в”ѓв”Ѓв”Џв”›  в”ѓ  в”Џв”Ѓв”ѓв”Ѓв”Џв”›в”ѓ в”ѓв”ѓ в”ѓ в”ѓ 
# в”Ѓв”Ѓв”›в”›в”› в”›в”Ѓв”Ѓ в”Ѓв”Ѓв”›в”Ѓв”Ѓв”›  в”Ѓв”Ѓв”›   в”Ѓв”Ѓв”›в”› в”› в”› в”Ѓв”Ѓв”›в”Ѓв”Ѓв”› в”›
#      WINDOW

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
windowrule {
    name = Abrir archivo
    match:class = xdg-desktop-portal-gtk 
    float = yes
    center = yes
}
windowrule {
  name = windowrule-1
  float = on
  size = (monitor_w*0.7) (monitor_h*0.7)
  center = on
  opacity = 0.9
  match:class = ^(ranger-float)$
}
layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0
  match:namespace = swaync-control-center
}

layerrule {
  name = layerrule-2
  blur = on
  ignore_alpha = 0
  match:namespace = swaync-notification-window
}

layerrule {
 name = layerrule-3
 blur = on
 ignore_alpha = 0
 match:namespace = swayosd
}
